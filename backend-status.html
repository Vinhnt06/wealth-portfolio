<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YourFin Backend Status</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .header p {
            color: #71717a;
            font-size: 14px;
        }
        
        .status-card {
            background: #111;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 20px;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 2s infinite;
        }
        
        .status-dot.loading {
            background: #f59e0b;
        }
        
        .status-dot.error {
            background: #ef4444;
            animation: none;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .status-text {
            font-size: 18px;
            font-weight: 600;
        }
        
        .info-grid {
            display: grid;
            gap: 16px;
        }
        
        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .info-item:last-child {
            border-bottom: none;
        }
        
        .info-label {
            color: #71717a;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .info-value {
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 14px;
            font-weight: 600;
        }
        
        .endpoints {
            margin-top: 24px;
        }
        
        .endpoint {
            background: #0a0a0a;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 8px;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 13px;
            color: #10b981;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .endpoint:hover {
            border-color: rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.02);
        }
        
        .refresh-btn {
            width: 100%;
            padding: 14px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .refresh-btn:hover {
            background: #e5e5e5;
        }
        
        .refresh-btn:active {
            transform: scale(0.98);
        }
        
        .loading {
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>YourFin Backend</h1>
            <p>Real-time API Status Monitor</p>
        </div>
        
        <div class="status-card">
            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div>
                <div class="status-text" id="statusText">Checking...</div>
            </div>
            
            <div class="info-grid" id="infoGrid">
                <div class="info-item">
                    <span class="info-label">Status</span>
                    <span class="info-value" id="status">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Uptime</span>
                    <span class="info-value" id="uptime">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Version</span>
                    <span class="info-value" id="version">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Database</span>
                    <span class="info-value" id="database">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Last Updated</span>
                    <span class="info-value" id="lastUpdated">-</span>
                </div>
            </div>
            
            <div class="endpoints">
                <div class="endpoint" onclick="window.open('https://yourfin-backend.onrender.com/api/health', '_blank')">
                    GET /api/health
                </div>
                <div class="endpoint" onclick="window.open('https://yourfin-backend.onrender.com/api/status', '_blank')">
                    GET /api/status
                </div>
            </div>
        </div>
        
        <button class="refresh-btn" onclick="checkStatus()">Refresh Status</button>
    </div>
    
    <script>
        const API_URL = 'https://yourfin-backend.onrender.com';
        
        async function checkStatus() {
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            
            statusDot.className = 'status-dot loading';
            statusText.textContent = 'Checking...';
            
            try {
                const response = await fetch(`${API_URL}/api/status`);
                const data = await response.json();
                
                if (response.ok) {
                    statusDot.className = 'status-dot';
                    statusText.textContent = 'All Systems Operational';
                    
                    document.getElementById('status').textContent = data.status;
                    document.getElementById('uptime').textContent = data.uptime;
                    document.getElementById('version').textContent = data.version;
                    document.getElementById('database').textContent = data.database?.status || 'Unknown';
                    document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString();
                } else {
                    throw new Error('API returned error');
                }
            } catch (error) {
                statusDot.className = 'status-dot error';
                statusText.textContent = 'Service Unavailable';
                
                document.getElementById('status').textContent = 'DOWN';
                document.getElementById('uptime').textContent = '-';
                document.getElementById('version').textContent = '-';
                document.getElementById('database').textContent = '-';
                document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString();
            }
        }
        
        // Check status on load
        checkStatus();
        
        // Auto-refresh every 30 seconds
        setInterval(checkStatus, 30000);
    </script>
</body>
</html>
