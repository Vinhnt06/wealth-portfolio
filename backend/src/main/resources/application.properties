spring.application.name=yourfin-api

# Default to port 8080 (Mapped automatically by Render)
server.port=${PORT:8080}

# PostgreSQL Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/yourfin}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA & Hibernate Settings
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Secret config (to be used later for Auth)
jwt.secret=${JWT_SECRET:your-256-bit-secret-your-256-bit-secret-your-256-bit-secret}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}
